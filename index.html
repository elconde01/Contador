<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>YOLOv8 Object Counter</title>

<!-- ONNX Runtime Web -->
<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>

<style>

*{
    box-sizing: border-box;
}

body{
    margin:0;
    background:#101010;
    color:white;
    font-family:Arial, Helvetica, sans-serif;
    text-align:center;
}

h1{
    margin:10px;
    font-size:22px;
}

#container{
    position:relative;
    width:100%;
    max-width:900px;
    margin:auto;
}

video,
canvas{
    width:100%;
    height:auto;
    border-radius:10px;
}

canvas{
    position:absolute;
    left:0;
    top:0;
}

.panel{
    background:#202020;
    margin:10px;
    padding:10px;
    border-radius:10px;
}

label{
    display:block;
    margin:8px;
}

button,
select,
input{
    padding:8px;
    margin:5px;
    border-radius:5px;
    border:none;
}

#objects{
    font-size:18px;
    margin-top:10px;
}

#status{
    color:#00ff90;
}

#fps{
    color:#00ccff;
}

</style>

</head>

<body>

<h1>
📷 Contador de Objetos con YOLOv8
</h1>


<div id="container">

    <video 
        id="video"
        autoplay 
        playsinline 
        muted>
    </video>

    <canvas id="canvas">
    </canvas>

</div>


<div class="panel">

    <div id="status">
        Inicializando...
    </div>

    <div id="fps">
        FPS: 0
    </div>

</div>


<div class="panel">

    <label>
        Cámara:
        <select id="cameraSelect">
        </select>
    </label>


    <label>
        Sensibilidad:
        <input 
            id="confidence"
            type="range"
            min="0.1"
            max="0.9"
            step="0.05"
            value="0.5">
            
        <span id="confidenceValue">
            50%
        </span>

    </label>


    <button id="freezeButton">
        ⏸ Congelar
    </button>

</div>


<div class="panel">

    <h3>
        Objetos detectados
    </h3>

    <div id="objects">
        Ninguno
    </div>

</div>


<!-- Lista de etiquetas COCO -->
<script src="labels.js"></script>


<!-- Lógica principal -->
<script src="app.js"></script>


</body>

</html>
